<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - VaralTech</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>
    <div class="sign-up-container">
        <img class="img-logo" src="../img/Logo.png" alt="logo">
        <h2>Bem Vindo</h2>
        <h3>Crie sua conta e comece a revolucionar a sua vida</h3>

        <div class="input-container">
            <input type="text" id="username" placeholder="Nome de usuário">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <input type="password" id="confirmpassword" placeholder="Confirmar senha">
        </div>

        <button class="bnt-sign-up" id="btn-cadastro">Cadastrar</button>

        <p class="error-msg" id="error-msg"></p>

        <a class="login-bnt" href="../html/login.html">
            Já possui uma conta? <strong>Conecte-se</strong>
        </a>
    </div>

    <script src="../js/cadastro.js"></script>
</body>
</html>
