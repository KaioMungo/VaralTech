<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Sign-up Page</title>

</head>
<body>
    <div class="sign-up-container">
        <img class="img-logo" src="../img/Logo.png" alt="logo">
        <h2>Bem Vindo</h2>
        <h3>Entre para continuar revolucionando a sua vida</h3>
        <div class="input-container">
            <input class="username"type="username" alt="username" id="username" placeholder="Nome de usuário">
            <input class="email"type="email" alt="email" id="email" placeholder="E-mail">
            <input class="password" type="password" alt="password" id="password" placeholder="Senha">
            <input class="confirmpassword" type="confirmpassword" alt="confirmpassword" id="confirmpassword" placeholder="Confirmar senha">
        </div>
        <button class="bnt-sign-up">Entrar</button>
        <a class="login-bnt" href="../html/login.html">Já possui uma conta? <strong>Conecte-se</strong></a>
    </div>

    
</body>
</html>
